<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 520" fill="none">
  <defs>
    <filter id="sh1" x="-15%" y="-8%" width="130%" height="130%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#000" flood-opacity="0.18"/>
    </filter>
    <filter id="sh2" x="-15%" y="-8%" width="130%" height="130%">
      <feDropShadow dx="0" dy="6" stdDeviation="7" flood-color="#000" flood-opacity="0.14"/>
    </filter>

    <!-- Side shading gradient -->
    <linearGradient id="sideL" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#000" stop-opacity="0.18"/>
      <stop offset="12%"  stop-color="#000" stop-opacity="0.04"/>
      <stop offset="50%"  stop-color="#fff" stop-opacity="0.05"/>
      <stop offset="88%"  stop-color="#000" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0.18"/>
    </linearGradient>
    <linearGradient id="topL" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#fff" stop-opacity="0.15"/>
      <stop offset="35%"  stop-color="#fff" stop-opacity="0.02"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0.14"/>
    </linearGradient>

    <!-- Clip paths for each shirt -->
    <clipPath id="clipC">
      <!-- Center white shirt (scale ~0.68, translate 110,55) -->
      <path d="M 212 97 C 197 96 180 100 163 109 C 151 115 136 122 120 130 C 118 133 117 137 117 142 L 117 155 C 117 160 120 163 125 163 L 151 163 C 156 163 159 160 160 155 L 162 147 C 163 143 166 141 170 142 C 168 183 166 227 167 340 L 313 340 C 314 227 312 183 310 142 C 314 141 317 143 318 147 L 320 155 C 321 160 324 163 329 163 L 355 163 C 360 162 363 159 363 155 L 363 142 C 363 137 362 133 360 130 C 344 122 329 115 317 109 C 300 100 283 96 268 97 C 263 103 259 109 255 112 Q 240 116 225 112 C 221 109 217 103 212 97 Z"/>
    </clipPath>
    <clipPath id="clipL">
      <!-- Left navy shirt (scale ~0.50, translate 14,100) -->
      <path d="M 81 155 C 71 154 61 157 50 162 C 43 165 33 170 23 175 C 21 177 20 179 20 182 L 20 190 C 20 193 22 195 25 195 L 40 195 C 43 195 45 193 46 190 L 47 185 C 48 183 50 182 52 182 C 51 204 50 228 51 294 L 149 294 C 150 228 149 204 148 182 C 150 182 152 183 153 185 L 154 190 C 155 193 157 195 160 195 L 175 195 C 178 194 180 192 180 190 L 180 182 C 180 179 179 177 177 175 C 167 170 157 165 150 162 C 139 157 129 154 119 155 C 116 158 114 161 112 163 Q 105 165 98 163 C 96 161 94 158 81 155 Z"/>
    </clipPath>
    <clipPath id="clipR">
      <!-- Right green shirt (scale ~0.50, translate 296,105) -->
      <path d="M 363 160 C 353 159 343 162 332 167 C 325 170 315 175 305 180 C 303 182 302 184 302 187 L 302 195 C 302 198 304 200 307 200 L 322 200 C 325 200 327 198 328 195 L 329 190 C 330 188 332 187 334 187 C 333 209 332 233 333 299 L 431 299 C 432 233 431 209 430 187 C 432 187 434 188 435 190 L 436 195 C 437 198 439 200 442 200 L 457 200 C 460 199 462 197 462 195 L 462 187 C 462 184 461 182 459 180 C 449 175 439 170 432 167 C 421 162 411 159 401 160 C 398 163 396 166 394 168 Q 387 170 380 168 C 378 166 376 163 363 160 Z"/>
    </clipPath>
  </defs>

  <!-- ═══════════════════════════════════════════════ -->
  <!-- LEFT SHIRT — Navy Blue (rotated -9deg)          -->
  <!-- ═══════════════════════════════════════════════ -->
  <g transform="rotate(-9 105 240)" opacity="0.90" filter="url(#sh2)">
    <path fill="#1e3a5f" stroke="rgba(0,0,0,0.12)" stroke-width="1.2"
      d="M 81 155 C 71 154 61 157 50 162 C 43 165 33 170 23 175 C 21 177 20 179 20 182 L 20 190 C 20 193 22 195 25 195 L 40 195 C 43 195 45 193 46 190 L 47 185 C 48 183 50 182 52 182 C 51 204 50 228 51 294 L 149 294 C 150 228 149 204 148 182 C 150 182 152 183 153 185 L 154 190 C 155 193 157 195 160 195 L 175 195 C 178 194 180 192 180 190 L 180 182 C 180 179 179 177 177 175 C 167 170 157 165 150 162 C 139 157 129 154 119 155 C 116 158 114 161 112 163 Q 105 165 98 163 C 96 161 94 158 81 155 Z"/>
    <!-- collar rib -->
    <path fill="#1e3a5f" stroke="rgba(0,0,0,0.10)" stroke-width="1.5"
      d="M 81 155 C 85 148 95 145 100 145 C 105 145 115 148 119 155 C 114 163 111 167 108 168 Q 100 170 92 168 C 89 167 86 163 81 155 Z"/>
    <path fill="rgba(0,0,0,0.22)"
      d="M 83 157 C 87 150 95 147 100 147 C 105 147 113 150 117 157 C 112 165 109 168 106 168 Q 100 170 94 168 C 91 167 88 164 83 157 Z"/>
    <!-- shading -->
    <g clip-path="url(#clipL)">
      <rect x="14" y="145" width="172" height="158" fill="url(#sideL)"/>
      <rect x="14" y="145" width="172" height="158" fill="url(#topL)"/>
    </g>
  </g>

  <!-- ═══════════════════════════════════════════════ -->
  <!-- RIGHT SHIRT — Dark Green (rotated +9deg)        -->
  <!-- ═══════════════════════════════════════════════ -->
  <g transform="rotate(9 382 247)" opacity="0.90" filter="url(#sh2)">
    <path fill="#14532d" stroke="rgba(0,0,0,0.12)" stroke-width="1.2"
      d="M 363 160 C 353 159 343 162 332 167 C 325 170 315 175 305 180 C 303 182 302 184 302 187 L 302 195 C 302 198 304 200 307 200 L 322 200 C 325 200 327 198 328 195 L 329 190 C 330 188 332 187 334 187 C 333 209 332 233 333 299 L 431 299 C 432 233 431 209 430 187 C 432 187 434 188 435 190 L 436 195 C 437 198 439 200 442 200 L 457 200 C 460 199 462 197 462 195 L 462 187 C 462 184 461 182 459 180 C 449 175 439 170 432 167 C 421 162 411 159 401 160 C 398 163 396 166 394 168 Q 387 170 380 168 C 378 166 376 163 363 160 Z"/>
    <!-- collar rib -->
    <path fill="#14532d" stroke="rgba(0,0,0,0.10)" stroke-width="1.5"
      d="M 363 160 C 367 153 377 150 382 150 C 387 150 397 153 401 160 C 396 168 393 172 390 173 Q 382 175 374 173 C 371 172 368 168 363 160 Z"/>
    <path fill="rgba(0,0,0,0.22)"
      d="M 365 162 C 369 155 377 152 382 152 C 387 152 395 155 399 162 C 394 170 391 173 388 173 Q 382 175 376 173 C 373 172 370 168 365 162 Z"/>
    <!-- design hint on green shirt -->
    <rect x="362" y="210" width="42" height="42" rx="5" fill="#22c55e" opacity="0.25"/>
    <text x="383" y="236" text-anchor="middle" fill="#86efac" font-family="Impact,Arial Black,sans-serif" font-size="8" opacity="0.8">BEAST</text>
    <!-- shading -->
    <g clip-path="url(#clipR)">
      <rect x="296" y="150" width="172" height="158" fill="url(#sideL)"/>
      <rect x="296" y="150" width="172" height="158" fill="url(#topL)"/>
    </g>
  </g>

  <!-- ═══════════════════════════════════════════════ -->
  <!-- CENTER SHIRT — White (front, main focus)        -->
  <!-- ═══════════════════════════════════════════════ -->
  <g filter="url(#sh1)">
    <path fill="#f5f5f5" stroke="#e4e4e7" stroke-width="1.8"
      d="M 212 97 C 197 96 180 100 163 109 C 151 115 136 122 120 130 C 118 133 117 137 117 142 L 117 155 C 117 160 120 163 125 163 L 151 163 C 156 163 159 160 160 155 L 162 147 C 163 143 166 141 170 142 C 168 183 166 227 167 340 L 313 340 C 314 227 312 183 310 142 C 314 141 317 143 318 147 L 320 155 C 321 160 324 163 329 163 L 355 163 C 360 162 363 159 363 155 L 363 142 C 363 137 362 133 360 130 C 344 122 329 115 317 109 C 300 100 283 96 268 97 C 263 103 259 109 255 112 Q 240 116 225 112 C 221 109 217 103 212 97 Z"/>
    <!-- collar rib -->
    <path fill="#f0f0f0" stroke="#e4e4e7" stroke-width="1.8"
      d="M 212 97 C 218 86 231 82 240 82 C 249 82 262 86 268 97 C 261 109 257 116 253 118 Q 240 122 227 118 C 223 116 219 109 212 97 Z"/>
    <path fill="rgba(0,0,0,0.18)"
      d="M 216 100 C 221 90 232 87 240 87 C 248 87 259 90 264 100 C 258 112 254 117 251 118 Q 240 121 229 118 C 226 117 222 112 216 100 Z"/>
    <!-- fabric shading on center shirt -->
    <g clip-path="url(#clipC)">
      <rect x="110" y="88" width="260" height="262" fill="url(#sideL)"/>
      <rect x="110" y="88" width="260" height="262" fill="url(#topL)"/>
      <!-- shoulder seam left -->
      <path d="M 170 142 C 166 128 163 114 163 109" fill="none" stroke="rgba(0,0,0,0.08)" stroke-width="1.5" stroke-linecap="round"/>
      <!-- shoulder seam right -->
      <path d="M 310 142 C 314 128 317 114 317 109" fill="none" stroke="rgba(0,0,0,0.08)" stroke-width="1.5" stroke-linecap="round"/>
      <!-- side seam left -->
      <path d="M 170 148 C 168 210 167 270 168 340" fill="none" stroke="rgba(0,0,0,0.05)" stroke-width="1" stroke-linecap="round"/>
      <!-- side seam right -->
      <path d="M 310 148 C 312 210 313 270 312 340" fill="none" stroke="rgba(0,0,0,0.05)" stroke-width="1" stroke-linecap="round"/>
      <!-- cuff lines -->
      <path d="M 118 160 L 152 161" fill="none" stroke="rgba(0,0,0,0.09)" stroke-width="2" stroke-linecap="round"/>
      <path d="M 328 161 L 362 160" fill="none" stroke="rgba(0,0,0,0.09)" stroke-width="2" stroke-linecap="round"/>
      <!-- hem -->
      <path d="M 168 337 L 312 337" fill="none" stroke="rgba(0,0,0,0.09)" stroke-width="2" stroke-linecap="round"/>
    </g>

    <!-- ── CHEST PRINT — Gharsip brand design ── -->
    <rect x="212" y="168" width="56" height="56" rx="8" fill="#2E7D32"/>
    <text x="240" y="198" text-anchor="middle" fill="white"
      font-family="Impact,Arial Black,sans-serif" font-size="11" font-weight="900">GHARSIP</text>
    <text x="240" y="212" text-anchor="middle" fill="#86efac"
      font-family="Arial,sans-serif" font-size="7" letter-spacing="1">CUSTOM PRINTS</text>
    <!-- print sheen overlay -->
    <rect x="212" y="168" width="56" height="56" rx="8"
      fill="url(#topL)" opacity="0.5"/>
  </g>

  <!-- ── FLOATING INFO BADGES ── -->
  <!-- "Live Preview" badge top-left -->
  <rect x="16" y="44" width="118" height="28" rx="14" fill="#2E7D32" opacity="0.95"/>
  <circle cx="34" cy="58" r="5" fill="#86efac"/>
  <text x="44" y="62" fill="white" font-family="Arial,sans-serif" font-size="11" font-weight="bold">Live Preview</text>

  <!-- Rating badge bottom-left -->
  <rect x="16" y="380" width="148" height="46" rx="12" fill="white" stroke="#e4e4e7" stroke-width="1"/>
  <text x="30" y="400" fill="#f59e0b" font-family="Arial,sans-serif" font-size="15">★★★★★</text>
  <text x="30" y="417" fill="#374151" font-family="Arial,sans-serif" font-size="10" font-weight="bold">2,000+ happy orders</text>

  <!-- Delivery badge bottom-right -->
  <rect x="316" y="380" width="148" height="46" rx="12" fill="white" stroke="#e4e4e7" stroke-width="1"/>
  <text x="332" y="400" fill="#2E7D32" font-family="Arial,sans-serif" font-size="15">📦</text>
  <text x="356" y="400" fill="#374151" font-family="Arial,sans-serif" font-size="11" font-weight="bold">4–5 day delivery</text>
  <text x="356" y="415" fill="#9ca3af" font-family="Arial,sans-serif" font-size="9">Pan India shipping</text>

  <!-- Color swatches panel (right side) -->
  <rect x="376" y="130" width="92" height="148" rx="14" fill="white" stroke="#e4e4e7" stroke-width="1"/>
  <text x="422" y="150" text-anchor="middle" fill="#9ca3af"
    font-family="Arial,sans-serif" font-size="9" font-weight="bold" letter-spacing="1">COLORS</text>
  <circle cx="400" cy="168" r="11" fill="#f5f5f5" stroke="#e4e4e7" stroke-width="1.5"/>
  <circle cx="425" cy="168" r="11" fill="#171717"/>
  <circle cx="450" cy="168" r="11" fill="#b91c1c"/>
  <circle cx="400" cy="196" r="11" fill="#1e3a5f"/>
  <circle cx="425" cy="196" r="11" fill="#2E7D32"/>
  <circle cx="450" cy="196" r="11" fill="#ea580c"/>
  <circle cx="400" cy="224" r="11" fill="#7e22ce"/>
  <circle cx="425" cy="224" r="11" fill="#eab308"/>
  <circle cx="450" cy="224" r="11" fill="#ec4899"/>
  <text x="422" y="252" text-anchor="middle" fill="#9ca3af" font-family="Arial,sans-serif" font-size="9">+3 more</text>
</svg>
