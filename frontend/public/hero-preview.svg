<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 460" fill="none">
  <defs>
    <linearGradient id="teeGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f4f4f5"/>
    </linearGradient>
    <linearGradient id="teeGrad2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e3a5f"/>
      <stop offset="100%" stop-color="#0f1f3d"/>
    </linearGradient>
    <linearGradient id="teeGrad3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a4731"/>
      <stop offset="100%" stop-color="#0d2d1e"/>
    </linearGradient>
    <linearGradient id="printGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2E7D32"/>
      <stop offset="100%" stop-color="#1B5E20"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-5%" width="120%" height="130%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#000" flood-opacity="0.15"/>
    </filter>
    <filter id="shadowSm" x="-15%" y="-10%" width="130%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#000" flood-opacity="0.12"/>
    </filter>
  </defs>

  <!-- Back-left shirt (navy) -->
  <g transform="translate(18,80) rotate(-8,110,200)" filter="url(#shadowSm)" opacity="0.88">
    <path fill="url(#teeGrad2)" stroke="#0a1628" stroke-width="1.5"
      d="M74 110 Q71 110 61 126 L54 190 Q52 238 58 254 L162 254 Q168 238 166 190 L159 126 Q149 110 146 110 L136 122 L84 122 Z"/>
    <path fill="url(#teeGrad2)" stroke="#0a1628" stroke-width="1"
      d="M74 110 L44 140 L54 190 Z"/>
    <path fill="url(#teeGrad2)" stroke="#0a1628" stroke-width="1"
      d="M146 110 L176 140 L166 190 Z"/>
    <ellipse cx="110" cy="116" rx="26" ry="11" fill="url(#teeGrad2)" stroke="#0a1628" stroke-width="1"/>
    <!-- small design on chest -->
    <rect x="88" y="136" width="44" height="44" rx="7" fill="#22d3ee" opacity="0.2"/>
    <text x="110" y="162" text-anchor="middle" fill="#22d3ee" font-family="Arial,sans-serif" font-size="9" font-weight="bold" opacity="0.8">404</text>
  </g>

  <!-- Back-right shirt (dark green) -->
  <g transform="translate(232,90) rotate(9,110,190)" filter="url(#shadowSm)" opacity="0.88">
    <path fill="url(#teeGrad3)" stroke="#061a0e" stroke-width="1.5"
      d="M74 110 Q71 110 61 126 L54 190 Q52 238 58 254 L162 254 Q168 238 166 190 L159 126 Q149 110 146 110 L136 122 L84 122 Z"/>
    <path fill="url(#teeGrad3)" stroke="#061a0e" stroke-width="1"
      d="M74 110 L44 140 L54 190 Z"/>
    <path fill="url(#teeGrad3)" stroke="#061a0e" stroke-width="1"
      d="M146 110 L176 140 L166 190 Z"/>
    <ellipse cx="110" cy="116" rx="26" ry="11" fill="url(#teeGrad3)" stroke="#061a0e" stroke-width="1"/>
    <!-- small design on chest -->
    <rect x="88" y="136" width="44" height="44" rx="7" fill="#22c55e" opacity="0.2"/>
    <text x="110" y="158" text-anchor="middle" fill="#86efac" font-family="Impact,sans-serif" font-size="8" font-weight="bold">BEAST</text>
    <text x="110" y="170" text-anchor="middle" fill="#86efac" font-family="Impact,sans-serif" font-size="8">MODE</text>
  </g>

  <!-- Shadow for center shirt -->
  <ellipse cx="210" cy="420" rx="130" ry="22" fill="#111827" opacity="0.1"/>

  <!-- Center shirt (white) — front and center -->
  <g transform="translate(68,50)" filter="url(#shadow)">
    <path fill="url(#teeGrad)" stroke="#e4e4e7" stroke-width="2"
      d="M98 132 Q94 132 80 154 L70 246 Q68 326 76 348 L224 348 Q232 326 230 246 L220 154 Q206 132 202 132 L186 148 L114 148 Z"/>
    <path fill="url(#teeGrad)" stroke="#e4e4e7" stroke-width="1.5"
      d="M98 132 L52 176 L70 246 Z"/>
    <path fill="url(#teeGrad)" stroke="#e4e4e7" stroke-width="1.5"
      d="M202 132 L248 176 L230 246 Z"/>
    <ellipse cx="150" cy="140" rx="36" ry="16" fill="url(#teeGrad)" stroke="#e4e4e7" stroke-width="2"/>
    <ellipse cx="150" cy="146" rx="24" ry="12" fill="#f4f4f5"/>

    <!-- Chest design area -->
    <rect x="110" y="178" width="80" height="80" rx="12" fill="url(#printGrad)"/>
    <!-- G logo inside design -->
    <text x="150" y="216" text-anchor="middle" fill="white" font-family="Impact,Arial Black,sans-serif" font-size="18" font-weight="900">GHARSIP</text>
    <text x="150" y="238" text-anchor="middle" fill="#86efac" font-family="Arial,sans-serif" font-size="9" letter-spacing="3">CUSTOM PRINTS</text>
    <circle cx="150" cy="252" r="3" fill="white" opacity="0.6"/>
  </g>

  <!-- Color swatches panel -->
  <rect x="304" y="170" width="102" height="160" rx="16" fill="white" stroke="#e4e4e7" stroke-width="1"/>
  <text x="355" y="192" text-anchor="middle" fill="#9ca3af" font-family="Arial,sans-serif" font-size="9" font-weight="bold" letter-spacing="1">COLORS</text>
  <circle cx="330" cy="214" r="13" fill="#ffffff" stroke="#e4e4e7" stroke-width="1.5"/>
  <circle cx="358" cy="214" r="13" fill="#111827"/>
  <circle cx="386" cy="214" r="13" fill="#dc2626"/>
  <circle cx="330" cy="246" r="13" fill="#1e3a5f"/>
  <circle cx="358" cy="246" r="13" fill="#2E7D32"/>
  <circle cx="386" cy="246" r="13" fill="#f97316"/>
  <circle cx="330" cy="278" r="13" fill="#a78bfa"/>
  <circle cx="358" cy="278" r="13" fill="#fbbf24"/>
  <circle cx="386" cy="278" r="13" fill="#ec4899"/>
  <text x="355" y="310" text-anchor="middle" fill="#9ca3af" font-family="Arial,sans-serif" font-size="9">10+ more</text>

  <!-- "Live Preview" badge -->
  <rect x="10" y="54" width="122" height="30" rx="15" fill="#2E7D32" filter="url(#shadowSm)"/>
  <circle cx="30" cy="69" r="5" fill="#86efac"/>
  <text x="44" y="73" fill="white" font-family="Arial,sans-serif" font-size="11" font-weight="bold">Live Preview</text>

  <!-- Rating badge -->
  <rect x="10" y="378" width="140" height="44" rx="12" fill="white" stroke="#e4e4e7" stroke-width="1"/>
  <text x="26" y="398" fill="#fbbf24" font-family="Arial,sans-serif" font-size="14">★★★★★</text>
  <text x="26" y="413" fill="#374151" font-family="Arial,sans-serif" font-size="10" font-weight="bold">2,000+ happy orders</text>

  <!-- Delivery badge -->
  <rect x="264" y="378" width="142" height="44" rx="12" fill="white" stroke="#e4e4e7" stroke-width="1"/>
  <text x="280" y="396" fill="#2E7D32" font-family="Arial,sans-serif" font-size="18">📦</text>
  <text x="308" y="397" fill="#374151" font-family="Arial,sans-serif" font-size="10" font-weight="bold">4–5 day delivery</text>
  <text x="308" y="412" fill="#9ca3af" font-family="Arial,sans-serif" font-size="9">Pan India shipping</text>
</svg>
