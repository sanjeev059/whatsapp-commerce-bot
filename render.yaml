# Gharsip Meal Subscriptions backend (FastAPI) — Deploy on Render (Blueprint).
services:
  - type: web
    name: gharsip-backend
    runtime: python
    region: singapore
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn server:app --host 0.0.0.0 --port $PORT"
    rootDir: backend
    healthCheckPath: /api/
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
      - key: MONGO_URL
        sync: false # MongoDB Atlas connection string (required)
      - key: DB_NAME
        value: gharsip_store # database name inside Atlas
      - key: ADMIN_API_TOKEN
        sync: false # long random Bearer secret — duplicate on Vercel (server-side only)
      - key: CORS_ORIGINS
        sync: false # comma list: https://your-app.vercel.app,https://your-domain.com
      # Optional overrides (defaults shown in backend/.env.example)
      - key: META_COLLECTION
        sync: false
